<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 在渲染前先套用主題，避免深色模式閃爍白底 -->
    <script>
      (function () {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
    <link rel="shortcut icon" href="/img/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">

    <title>找不到頁面 (404) | TWStockWatch</title>
    <meta name="robots" content="noindex, follow">
</head>

            <h1 class="app-title">
                <a href="/"><span aria-hidden="true">📈</span>台灣股市法人籌碼與連買連賣看板</a>
            </h1>
            <nav class="main-nav">
                <a href="/articles/">📚 文章專區</a>
                <a href="/about.html">關於我</a>
            </nav>
            <div class="header-controls">
                <button id="theme-toggle" class="theme-btn" aria-label="切換深淺模式">🌓</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <section class="instruction-section" style="text-align: center;">
                <h2 class="instruction-title" style="justify-content: center;">🧭 找不到這個頁面</h2>
                <div class="instruction-body">
                    <p style="font-size: 48px; font-weight: 700; margin: 8px 0;">404</p>
                    <p>糟糕，你要找的頁面可能已經被移動、改名，或根本不存在。</p>
                    <p>別擔心，市場還在，籌碼也還在。試試下面幾個地方：</p>
                    <div class="article-card-list" style="max-width: 520px; margin: 20px auto 0;">
                        <a class="article-card" href="/">
                            <div class="article-card-text">
                                <span class="article-card-title">🏠 回到首頁看板</span>
                                <span class="article-card-desc">查看今日三大法人籌碼、連買連賣排行與個股搜尋。</span>
                            </div>
                            <span class="article-card-arrow" aria-hidden="true">→</span>
                        </a>
                        <a class="article-card" href="/articles/">
                            <div class="article-card-text">
                                <span class="article-card-title">📚 逛逛文章專區</span>
                                <span class="article-card-desc">從新手導讀開始，一步步搞懂台股籌碼分析。</span>
                            </div>
                            <span class="article-card-arrow" aria-hidden="true">→</span>
                        </a>
                    </div>
                </div>
            </section>
        </div>
    </main>

        <div class="footer-container">

            </p>
            <p>© 2026 TWStockWatch. 本網站內容僅供參考，不構成任何投資建議。</p>
        </div>
    </footer>

    <script>
      document.getElementById('theme-toggle').addEventListener('click', function () {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    </script>
</body>
</html>
