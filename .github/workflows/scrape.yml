name: Scrape Daily Taiwan Stock Data

on:
  schedule:
    # 07:15 UTC 為台北時間 15:15 (週一至週五) - 最速核心資料更新
    - cron: '15 7 * * 1-5'
    # 08:00 UTC 為台北時間 16:00 (週一至週五) - 借券 SBL 完整資料更新
    - cron: '0 8 * * 1-5'
    # 09:30 UTC 為台北時間 17:30 (週一至週五) - 安全備用更新
    - cron: '30 9 * * 1-5'
    # 13:30 UTC 為台北時間 21:30 (週一至週五) - 晚間校對更新
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas matplotlib beautifulsoup4 yfinance lxml

    - name: Run Scraper and Data Builder
      run: |
        python build_static_data.py

    - name: Commit and Push static data and cache
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update daily stock data: $(date +'%Y-%m-%d')" && git push)
