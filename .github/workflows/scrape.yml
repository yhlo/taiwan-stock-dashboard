name: Scrape Daily Taiwan Stock Data

on:
  # Minutes are deliberately off the hour and half-hour: GitHub's scheduler is
  # most heavily contended at :00, and a run queued there is routinely delayed.
  schedule:
    # 台北時間 13:45
    - cron: '47 5 * * 1-5'
    # 台北時間 14:30
    - cron: '33 6 * * 1-5'
    # 台北時間 16:00
    - cron: '7 8 * * 1-5'
    # 台北時間 20:00
    - cron: '7 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas matplotlib beautifulsoup4 yfinance lxml

    - name: Run Scraper and Data Builder
      run: |
        python build_static_data.py

    - name: Commit and Push static data and cache
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/ index.html
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "Auto update daily stock data: $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
        fi
