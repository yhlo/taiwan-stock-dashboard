name: Scrape Daily Taiwan Stock Data

on:
  # Times below are when the run is *queued*, not when it starts. Measured over
  # 60 scheduled runs on this repo, GitHub starts them a median of 171 minutes
  # late (p25 127, p90 284); not one observed run started within the hour. The
  # schedule is therefore shifted earlier so a typical run lands when it is
  # actually useful rather than hours after.
  #
  # T86 publishes around 15:00 Taipei. A run that lands before then skips the
  # current day by design (see skip_today in build_static_data.py) and simply
  # republishes yesterday, so firing early is harmless -- being late is not.
  schedule:
    # queued 12:19 台北 -> 通常 15:10 前後開始（T86 剛公布）
    - cron: '19 4 * * 1-5'
    # queued 13:39 台北 -> 通常 16:30 前後
    - cron: '39 5 * * 1-5'
    # queued 15:39 台北 -> 通常 18:30 前後
    - cron: '39 7 * * 1-5'
    # queued 18:39 台北 -> 通常 21:30 前後（當日最後一次補抓）
    - cron: '39 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas matplotlib beautifulsoup4 yfinance lxml

    - name: Run Scraper and Data Builder
      run: |
        python build_static_data.py

    - name: Commit and Push static data and cache
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/ index.html
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "Auto update daily stock data: $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
        fi
