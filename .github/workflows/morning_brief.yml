name: Build Pre-Open Morning Brief

# Scheduled as early as the data allows, because GitHub's scheduler is slow and
# this job has a hard deadline at both ends.
#
# The night futures session ends at 05:00 Taipei and the day session opens at
# 08:45; once the day session is live TAIFEX serves the same row for both market
# codes and last night's close can no longer be read. That leaves a 3h45m window.
#
# Measured on this repo's own run history (60 scheduled runs): the median start
# is 171 minutes after the scheduled time, p90 is 284 minutes, and *every*
# observed run was over an hour late. Scheduling at 07:10 Taipei would therefore
# land inside the window only ~7% of the time; 05:10 lands ~80% of the time.
# Hence 21:10 UTC, the earliest slot the night-session data exists at all.
#
# Taipei is UTC+8, so a Taipei weekday morning falls on the *previous* UTC day:
# Taipei Mon-Fri == UTC Sun-Thu, hence day-of-week 0-4 (not 1-5).
#
# When a run does land late the brief still publishes; only the night-session
# tile is withheld, and it says so rather than showing a stale number.
on:
  schedule:
    - cron: '10 21 * * 0-4'   # 05:10 Taipei
    - cron: '40 21 * * 0-4'   # 05:40 Taipei (second attempt)
  workflow_dispatch:

permissions:
  contents: write

# Never let the backup run collide with a first run that is still going.
concurrency:
  group: morning-brief
  cancel-in-progress: false

jobs:
  build_brief:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas beautifulsoup4 yfinance lxml

    - name: Build morning brief
      run: |
        python build_morning_brief.py

    - name: Commit and push morning brief
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/morning_brief.json
        if ! git diff --staged --quiet; then
          git commit -m "Update morning brief: $(date -u -d '+8 hours' +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
        fi
